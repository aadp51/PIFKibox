<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIF-Kibox Dashboard</title>
  <meta name="description" content="Play Integrity Fix & Keybox Dashboard">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      background: linear-gradient(to bottom right, #0a0f14, #020406);
      color: #f0f0f0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }
    .tab-active {
      background-color: #00f2ff;
      color: black;
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    }
    .tab-inactive { color: #6272a4; }
    .tab-inactive:hover { color: white; }
    .btn-active {
      border-color: #00f2ff;
      color: #00f2ff;
      box-shadow: inset 0 0 10px rgba(0,242,255,0.1);
    }
    .btn-inactive { border-color: rgba(255,255,255,0.1); color: #6272a4; }
    .btn-inactive:hover { border-color: rgba(255,255,255,0.3); color: white; }
    
    /* Animasi Dropdown Enteng */
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out, padding 0.3s ease-out;
      padding-top: 0;
      padding-bottom: 0;
    }
    .accordion-content.expanded {
      max-height: 1000px;
      transition: max-height 0.5s ease-in, padding 0.5s ease-in;
    }
    .rotate-180 { transform: rotate(180deg); }
    .transition-transform { transition: transform 0.3s ease; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="p-4 sm:p-6 flex flex-col items-center">
  <header class="text-center mb-8 mt-4">
    <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter m-0">
      Pixel<span class="text-[#00f2ff]">Integrity</span>
    </h1>
    <p class="text-[#6272a4] text-[10px] tracking-[0.2em] uppercase mt-2 font-bold">
      Elite Device Integrity Hub
    </p>
  </header>

  <div class="grid grid-cols-3 bg-white/5 p-1 rounded-2xl border border-white/10 mb-8 w-full max-w-2xl gap-1">
    <button id="tab-pif" class="flex items-center justify-center gap-2 py-3 rounded-xl text-[10px] sm:text-xs font-bold uppercase transition-all duration-300 tab-active" onclick="switchTab('pif')">
      <i data-lucide="database" class="w-4 h-4"></i> PIF
    </button>
    <button id="tab-keybox" class="flex items-center justify-center gap-2 py-3 rounded-xl text-[10px] sm:text-xs font-bold uppercase transition-all duration-300 tab-inactive" onclick="switchTab('keybox')">
      <i data-lucide="zap" class="w-4 h-4"></i> Keybox
    </button>
    <button id="tab-fixer" class="flex items-center justify-center gap-2 py-3 rounded-xl text-[10px] sm:text-xs font-bold uppercase transition-all duration-300 tab-inactive" onclick="switchTab('fixer')">
      <i data-lucide="wand-2" class="w-4 h-4"></i> Format Fixer
    </button>
  </div>

  <div class="w-full max-w-2xl space-y-6">
    <div id="content-pif" class="space-y-6">
      <div id="pif-loading" class="text-center py-20 animate-pulse text-[#6272a4] font-bold uppercase tracking-widest">
        Loading Database...
      </div>
      <div id="pif-container" class="space-y-6 hidden"></div>
    </div>

    <div id="content-keybox" class="space-y-6 hidden">
      <div class="bg-white/5 border border-[#00f2ff]/10 backdrop-blur-md rounded-2xl p-6 shadow-lg">
        <h2 class="text-[#00f2ff] text-sm font-extrabold uppercase flex items-center gap-2 mb-4">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> Auto-Retrieval
        </h2>
        <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
          <button id="btn-tricky" onclick="fetchKeybox('tricky')" class="btn-inactive py-3 px-2 rounded-xl border text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all duration-300">
            Tricky
          </button>
          <button id="btn-yurikey" onclick="fetchKeybox('yurikey')" class="btn-inactive py-3 px-2 rounded-xl border text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all duration-300">
            Yurikey
          </button>
          <button id="btn-integrity" onclick="fetchKeybox('integrity')" class="btn-inactive py-3 px-2 rounded-xl border text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all duration-300">
            Integrity
          </button>
          <button id="btn-evox" onclick="fetchKeybox('evox')" class="btn-inactive py-3 px-2 rounded-xl border text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all duration-300">
            EvoX
          </button>
          <button id="btn-kowx" onclick="fetchKeybox('kowx')" class="btn-inactive py-3 px-2 rounded-xl border text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all duration-300">
            KOWX
          </button>
        </div>
      </div>

      <div id="download-section" class="hidden flex flex-col items-center justify-center mt-8 space-y-4">
        <div id="status-msg" class="text-xs font-bold tracking-widest uppercase text-[#6272a4]"></div>
        <a id="download-link" href="#" download="" class="w-full max-w-sm flex items-center justify-center gap-2 py-3 bg-[#00f2ff] text-black rounded-xl text-sm font-black uppercase tracking-widest shadow-[0_0_15px_rgba(0,242,255,0.3)] hover:scale-105 transition-all duration-300">
          <i data-lucide="download" class="w-4 h-4"></i> <span id="download-name">DOWNLOAD.XML</span>
        </a>
      </div>
    </div>

    <div id="content-fixer" class="space-y-6 hidden">
      <div class="bg-white/5 border border-[#00f2ff]/10 backdrop-blur-md rounded-2xl p-6 shadow-lg space-y-4">
        <h2 class="text-[#00f2ff] text-sm font-extrabold uppercase flex items-center gap-2">
          <i data-lucide="wand-2" class="w-4 h-4"></i> Keybox Format Fixer
        </h2>
        <p class="text-xs text-[#6272a4] leading-relaxed">
          Paste / upload / fetch keybox, lalu tool ini bikin ulang format PEM ala Yurikey: isi key & cert polos tanpa indent, chain tetap 3 certificate, dan bisa langsung copy full XML.
        </p>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <select id="fix-source" class="sm:col-span-2 bg-black/30 border border-white/10 rounded-xl px-3 py-3 text-xs font-bold text-white outline-none focus:border-[#00f2ff]">
            <option value="tricky">Fetch Tricky GitHub</option>
            <option value="kowx">Fetch KOWX Direct</option>
            <option value="yurikey">Fetch Yurikey</option>
            <option value="evox">Fetch EvoX</option>
            <option value="integrity">Fetch Integrity</option>
          </select>
          <button onclick="fetchAndFix()" class="py-3 px-3 rounded-xl border border-[#00f2ff] text-[#00f2ff] text-[10px] sm:text-xs font-black uppercase tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all">
            Fetch & Fix
          </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <label class="flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 text-[10px] sm:text-xs font-bold uppercase tracking-wider hover:border-[#00f2ff] hover:text-[#00f2ff] cursor-pointer transition-all">
            <i data-lucide="upload" class="w-4 h-4"></i> Upload XML
            <input id="fix-file" type="file" accept=".xml,text/xml" class="hidden" onchange="loadFixFile(event)">
          </label>
          <button onclick="fixFromTextarea()" class="py-3 rounded-xl border border-white/10 text-[10px] sm:text-xs font-bold uppercase tracking-wider hover:border-[#00f2ff] hover:text-[#00f2ff] transition-all">
            Fix Paste
          </button>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between gap-3">
            <label class="text-[10px] text-[#6272a4] font-black uppercase tracking-widest">Input Keybox</label>
            <button onclick="clearFixer()" class="text-[10px] text-[#ff6b6b] font-bold uppercase">Clear</button>
          </div>
          <textarea id="fix-input" spellcheck="false" placeholder="Paste keybox.xml di sini..." class="w-full min-h-[220px] bg-black/40 border border-white/10 rounded-xl p-3 text-[11px] font-mono text-white outline-none focus:border-[#00f2ff]"></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <input id="fix-comment" value="https://t.me/yuriiroot" placeholder="Comment PEM optional" class="sm:col-span-2 bg-black/30 border border-white/10 rounded-xl px-3 py-3 text-xs font-bold text-white outline-none focus:border-[#00f2ff]">
          <label class="flex items-center justify-center gap-2 bg-black/30 border border-white/10 rounded-xl px-3 py-3 text-[10px] font-bold uppercase text-[#6272a4]">
            <input id="fix-add-comment" type="checkbox" checked class="accent-[#00f2ff]"> Add Comment
          </label>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between gap-3">
            <label class="text-[10px] text-[#6272a4] font-black uppercase tracking-widest">Output Fixed XML</label>
            <span id="fix-status" class="text-[10px] text-[#6272a4] font-bold uppercase"></span>
          </div>
          <textarea id="fix-output" spellcheck="false" readonly placeholder="Output bakal muncul di sini..." class="w-full min-h-[260px] bg-black/40 border border-[#00f2ff]/20 rounded-xl p-3 text-[11px] font-mono text-white outline-none"></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <button onclick="copyFixedXml()" class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] sm:text-xs font-black uppercase tracking-widest hover:border-[#00f2ff] hover:text-[#00f2ff] transition-all">
            <i data-lucide="copy" class="w-4 h-4"></i> Copy Full XML
          </button>
          <button onclick="downloadFixedXml()" class="flex items-center justify-center gap-2 py-3 bg-[#00f2ff] text-black rounded-xl text-[10px] sm:text-xs font-black uppercase tracking-widest shadow-[0_0_15px_rgba(0,242,255,0.3)] hover:scale-105 transition-all">
            <i data-lucide="download" class="w-4 h-4"></i> Download Fixed
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Utility functions
    const hex = h => {
      const matches = h.match(/../g);
      if (!matches) return '';
      return matches.map(b => String.fromCharCode(parseInt(b, 16))).join('');
    };

    const rot = s => s.replace(/[a-z]/gi, c =>
      String.fromCharCode((c <= 'Z' ? 65 : 97) + (c.charCodeAt(0) - (c <= 'Z' ? 65 : 97) + 13) % 26)
    );

    const formatTime = ms => {
      const min = Math.floor(ms / 60000);
      const hr = Math.floor(min / 60);
      const day = Math.floor(hr / 24);
      if (min < 1) return 'Just now';
      if (min < 60) return `${min}m ago`;
      if (hr < 24) return `${hr}h ago`;
      return `${day}${day === 1 ? ' day ago' : ' days ago'}`;
    };

    const sources = {
      tricky: { r:'KOWX712/Tricky-Addon-Update-Target-List', b: 'keybox', p:'.extra', u: 'https://raw.githubusercontent.com/KOWX712/Tricky-Addon-Update-Target-List/refs/heads/keybox/.extra', n: 'tricky_addon.xml', mode: 'tricky' },
      kowx: { r:'KOWX712/Tricky-Addon-Update-Target-List', b: 'keybox', p:'.extra', u: 'https://keybox.kowx712.cc', n: 'kowx_keybox.xml', mode: 'auto' },
      yurikey: { r:'Yurii0307/yurikey', b: 'main', p:'key', u: 'https://raw.githubusercontent.com/Yurii0307/yurikey/main/key', n: 'yurikey.xml', mode: 'yurikey' },
      evox: { r:null, b: null, p:null, u: 'https://git.evolution-x.org/EvoX/keybox/raw/branch/main/keybox.xml', n: 'evox_keybox.xml', mode: 'plain' },
      integrity: { r:'MeowDump/MeowDump', b: 'main', p:'NullVoid/OptimusPrime', u: 'https://raw.githubusercontent.com/MeowDump/MeowDump/main/NullVoid/OptimusPrime', n: 'integritybox.xml', mode: 'integrity' }
    };

    async function getUpdateInfo(repo, path, branch) {
      try {
        const res = await fetch(`https://api.github.com/repos/${repo}/commits?path=${path}&sha=${branch}&per_page=1`);
        if (!res.ok) return 'Check Manual';
        const data = await res.json();
        if (data && data.length > 0) {
          return formatTime(Date.now() - new Date(data[0].commit.committer.date).getTime());
        }
        return 'Unknown';
      } catch {
        return 'Unavailable';
      }
    }

    // Direct Download Logic untuk PIF
    async function triggerDownload(url, filename) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Download failed');
        const blob = await res.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(blobUrl);
      } catch (err) {
        alert('Gagal mendownload file: ' + err.message);
      }
    }

    // Accordion Toggle
    function toggleExpand(id) {
      const content = document.getElementById(`detail-${id}`);
      const icon = document.getElementById(`icon-${id}`);
      
      if (content.classList.contains('expanded')) {
        content.classList.remove('expanded');
        content.style.padding = "0px 16px";
        icon.classList.remove('rotate-180');
      } else {
        content.classList.add('expanded');
        content.style.padding = "16px 16px";
        icon.classList.add('rotate-180');
      }
    }

    // Tab Switching
    function switchTab(tab) {
      ['pif', 'keybox', 'fixer'].forEach(t => {
        document.getElementById(`tab-${t}`).className = `flex items-center justify-center gap-2 py-3 rounded-xl text-[10px] sm:text-xs font-bold uppercase transition-all duration-300 ${tab === t ? 'tab-active' : 'tab-inactive'}`;
        document.getElementById(`content-${t}`).classList.toggle('hidden', tab !== t);
      });
    }

    // Fetch Database
    async function loadDatabase() {
      try {
        const res = await fetch('database.json');
        const data = await res.json();
        renderDatabase(data);
      } catch (err) {
        console.error('Failed to load database:', err);
        document.getElementById('pif-loading').innerText = 'Failed to load database.json';
      }
    }

    function renderDatabase(dbData) {
      const container = document.getElementById('pif-container');
      const loading = document.getElementById('pif-loading');
      
      if (!dbData || !dbData.devices || !dbData.devices.google) return;
      
      let html = '';
      for (const [codename, channels] of Object.entries(dbData.devices.google)) {
        const title = channels.stable?.MODEL || channels.beta?.MODEL || codename;
        
        let channelsHtml = '';
        for (const [channel, info] of Object.entries(channels)) {
          const badgeClass = channel === 'stable' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400';
          
          channelsHtml += `
            <div class="bg-black/20 border border-white/5 rounded-xl p-4 space-y-3">
              <div class="flex items-center justify-between mb-2">
                <span class="text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-wider ${badgeClass}">
                  ${channel}
                </span>
                <span class="text-[9px] text-[#6272a4] font-bold">${info.last_generated || ''}</span>
              </div>
              
              <div class="grid grid-cols-2 gap-y-2 text-[11px]">
                <div class="flex items-center gap-1.5 text-[#6272a4]">
                  <i data-lucide="hash" class="w-3 h-3"></i> Build: <span class="text-white font-bold">${info.BUILD_ID || ''}</span>
                </div>
                <div class="flex items-center gap-1.5 text-[#6272a4]">
                  <i data-lucide="calendar" class="w-3 h-3"></i> Patch: <span class="text-white font-bold">${info.SECURITY_PATCH || ''}</span>
                </div>
                <div class="flex items-center gap-1.5 text-[#6272a4]">
                  <i data-lucide="info" class="w-3 h-3"></i> OS: <span class="text-white font-bold">${info.RELEASE || ''}</span>
                </div>
                <div class="flex items-center gap-1.5 text-[#6272a4]">
                  <i data-lucide="cpu" class="w-3 h-3"></i> SDK: <span class="text-white font-bold">${info.SDK_INT || ''}</span>
                </div>
              </div>

              <div class="flex flex-col gap-2 pt-2">
                <button onclick="triggerDownload('${info.pif_url}', '${codename}_${channel}.json')" class="flex items-center justify-center gap-2 py-2 bg-white/5 border border-white/10 rounded-lg text-[10px] font-bold uppercase hover:border-[#00f2ff] hover:text-[#00f2ff] transition-all">
                  <i data-lucide="download" class="w-3.5 h-3.5"></i> PIF JSON
                </button>
                <div class="flex gap-2">
                  <a href="${info.boot_img || '#'}" download class="flex-1 flex items-center justify-center gap-2 py-2 bg-white/5 border border-white/10 rounded-lg text-[10px] font-bold uppercase hover:border-[#00f2ff] hover:text-[#00f2ff] transition-all">
                    <i data-lucide="zap" class="w-3.5 h-3.5"></i> Boot
                  </a>
                  <a href="${info.init_boot_img || '#'}" download class="flex-1 flex items-center justify-center gap-2 py-2 bg-white/5 border border-white/10 rounded-lg text-[10px] font-bold uppercase hover:border-[#00f2ff] hover:text-[#00f2ff] transition-all">
                    <i data-lucide="zap" class="w-3.5 h-3.5"></i> Init
                  </a>
                </div>
              </div>
            </div>
          `;
        }

        html += `
          <div class="bg-white/5 border border-[#00f2ff]/10 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg">
            <div onclick="toggleExpand('${codename}')" class="cursor-pointer bg-[#00f2ff]/5 p-4 flex items-center justify-between hover:bg-[#00f2ff]/10 transition-all relative z-10">
              <div class="flex items-center gap-3">
                <div class="bg-[#00f2ff] p-2 rounded-lg text-black">
                  <i data-lucide="smartphone" class="w-5 h-5"></i>
                </div>
                <div>
                  <h3 class="text-lg font-black uppercase italic tracking-tight leading-none">
                    ${title}
                  </h3>
                  <span class="text-[10px] text-[#6272a4] font-bold uppercase tracking-widest">${codename}</span>
                </div>
              </div>
              <i id="icon-${codename}" data-lucide="chevron-down" class="w-5 h-5 text-[#6272a4] transition-transform"></i>
            </div>
            <div id="detail-${codename}" class="accordion-content px-4 grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-[#00f2ff]/10">
              ${channelsHtml}
            </div>
          </div>
        `;
      }
      
      container.innerHTML = html;
      loading.classList.add('hidden');
      container.classList.remove('hidden');
      lucide.createIcons();
    }

    // Keybox Decode + Download
    function decodeKeyboxRaw(type, raw) {
      let final = '';
      const mode = sources[type]?.mode || type;
      const trimmed = raw.trim();

      if (!trimmed) throw new Error('Response kosong');

      if (mode === 'plain' || trimmed.startsWith('<?xml') || trimmed.includes('<AndroidAttestation')) {
        final = raw;
      } else if (mode === 'tricky') {
        final = atob(hex(raw.replace(/\s+/g, '')));
      } else if (mode === 'yurikey') {
        final = rot(atob(trimmed));
      } else if (mode === 'integrity') {
        final = atob(trimmed);
      } else if (mode === 'auto') {
        final = extractKeyboxFromKowx(raw);
      } else {
        final = raw;
      }

      if (!final.includes('<AndroidAttestation')) {
        throw new Error('Keybox XML tidak ditemukan di response');
      }
      return final.trim();
    }

    function extractKeyboxFromKowx(raw) {
      const trimmed = raw.trim();
      if (trimmed.startsWith('<?xml') || trimmed.includes('<AndroidAttestation')) return raw;

      try {
        const payload = JSON.parse(trimmed);
        const candidates = [
          payload.keybox,
          payload.xml,
          payload.content,
          payload.data,
          payload.result,
          payload?.data?.keybox,
          payload?.data?.xml,
          payload?.data?.content,
          ...(Array.isArray(payload) ? payload.map(item => item.keybox || item.xml || item.content || item.download_url || item.url) : [])
        ].filter(Boolean);

        for (const candidate of candidates) {
          if (typeof candidate === 'string') {
            if (candidate.includes('<AndroidAttestation')) return candidate;
            if (/^https?:\/\//.test(candidate)) continue;
            try {
              const decoded = atob(candidate.replace(/\s+/g, ''));
              if (decoded.includes('<AndroidAttestation')) return decoded;
            } catch {}
          }
        }
      } catch {}

      const doc = new DOMParser().parseFromString(raw, 'text/html');
      const downloadLink = [...doc.querySelectorAll('a[href], button[data-url], [data-download-url]')]
        .map(el => el.getAttribute('href') || el.dataset.url || el.dataset.downloadUrl)
        .find(value => value && (/download|keybox|\.xml/i.test(value)));
      if (downloadLink) {
        throw new Error(`KOWX butuh endpoint download langsung: ${new URL(downloadLink, sources.kowx.u).href}`);
      }

      throw new Error('Format KOWX belum dikenali');
    }

    async function fetchTextWithFallback(source) {
      const urls = [source.u, ...(source.fallbacks || [])];
      let lastError;
      for (const url of urls) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.text();
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('Fetch gagal');
    }

    async function fetchKeybox(type) {
      const source = sources[type];
      if (!source) return;

      Object.keys(sources).forEach(key => {
        const btn = document.getElementById(`btn-${key}`);
        if (btn) btn.className = btn.className.replace('btn-active', 'btn-inactive');
      });
      const activeBtn = document.getElementById(`btn-${type}`);
      if (activeBtn) activeBtn.className = activeBtn.className.replace('btn-inactive', 'btn-active');

      const section = document.getElementById('download-section');
      const status = document.getElementById('status-msg');
      const link = document.getElementById('download-link');
      const name = document.getElementById('download-name');
      section.classList.remove('hidden');
      status.innerText = `FETCHING ${type.toUpperCase()}...`;
      link.classList.add('pointer-events-none', 'opacity-50');

      try {
        const raw = await fetchTextWithFallback(source);
        const xml = decodeKeyboxRaw(type, raw);
        const blob = new Blob([xml], { type: 'text/xml' });
        const blobUrl = URL.createObjectURL(blob);
        link.href = blobUrl;
        link.download = source.n;
        name.innerText = source.n.toUpperCase();
        status.innerText = source.r ? `${type.toUpperCase()} • ${await getUpdateInfo(source.r, source.p, source.b)}` : `${type.toUpperCase()} READY`;
        link.classList.remove('pointer-events-none', 'opacity-50');
      } catch (err) {
        status.innerText = `GAGAL: ${err.message}`;
      }
    }

    async function fetchAndFix() {
      const type = document.getElementById('fix-source').value;
      const status = document.getElementById('fix-status');
      status.innerText = 'Fetching...';
      try {
        const raw = await fetchTextWithFallback(sources[type]);
        document.getElementById('fix-input').value = decodeKeyboxRaw(type, raw);
        fixFromTextarea();
      } catch (err) {
        status.innerText = `Gagal: ${err.message}`;
      }
    }

    function loadFixFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        document.getElementById('fix-input').value = reader.result;
        fixFromTextarea();
      };
      reader.readAsText(file);
    }

    function normalizePemBlock(text) {
      return text
        .replace(/-----BEGIN ([^-]+)-----\s*/g, '-----BEGIN $1-----\n')
        .replace(/\s*-----END ([^-]+)-----/g, '\n-----END $1-----')
        .replace(/-----BEGIN ([^-]+)-----\n([\s\S]*?)\n-----END \1-----/g, (_, label, body) => {
          const compact = body.replace(/\s+/g, '');
          const lines = compact.match(/.{1,64}/g) || [];
          return `-----BEGIN ${label}-----\n${lines.join('\n')}\n-----END ${label}-----`;
        });
    }

    function fixFromTextarea() {
      const input = document.getElementById('fix-input').value.trim();
      const output = document.getElementById('fix-output');
      const status = document.getElementById('fix-status');
      if (!input) {
        status.innerText = 'Input kosong';
        return;
      }

      const addComment = document.getElementById('fix-add-comment').checked;
      const comment = document.getElementById('fix-comment').value.trim();
      let fixed = normalizePemBlock(input);
      fixed = fixed.replace(/>\s+</g, '>\n<');
      if (addComment && comment) {
        fixed = fixed.replace(/(<PrivateKey format="pem">\s*)/g, `$1\n<!-- ${comment.replace(/--/g, '—')} -->\n`);
      }
      output.value = fixed;
      status.innerText = 'Fixed';
    }

    async function copyFixedXml() {
      const output = document.getElementById('fix-output').value;
      if (!output) return;
      await navigator.clipboard.writeText(output);
      document.getElementById('fix-status').innerText = 'Copied';
    }

    function downloadFixedXml() {
      const output = document.getElementById('fix-output').value;
      if (!output) return;
      const blob = new Blob([output], { type: 'text/xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'fixed_keybox.xml';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function clearFixer() {
      document.getElementById('fix-input').value = '';
      document.getElementById('fix-output').value = '';
      document.getElementById('fix-status').innerText = '';
    }

    loadDatabase();
  </script>
</body>
</html>

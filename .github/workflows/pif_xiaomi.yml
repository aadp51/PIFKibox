name: PIF Factory & Root Assets (Xiaomi)

on:
  workflow_dispatch:
    inputs:
      codename:
        description: 'Codename (contoh: sapphiren, marble, dll)'
        required: true
        default: 'sapphiren'
      region:
        description: 'Region (Global, Indonesia, EEA, China, dll)'
        required: true
        default: 'Global'
      rom_url:
        description: 'Direct Link .zip (Optional)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  forge_pif_xiaomi:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧹 Deep Cleanup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - name: 🛠️ Setup Environment
        run: |
          sudo apt update
          # Menggunakan erofs-utils dari apt agar tidak perlu kompilasi manual yang sering error
          sudo apt install -y aria2 p7zip-full p7zip-rar python3-pip wget curl jq unzip erofs-utils
          pip3 install --break-system-packages payload-dumper
          npm install yaml-js

      - name: 🎣 Scrape / Resolve Link
        id: scraper
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('yaml-js');
            const codename = '${{ github.event.inputs.codename }}'.toLowerCase();
            const region = '${{ github.event.inputs.region }}'.toLowerCase();
            const rom_url = '${{ github.event.inputs.rom_url }}';

            let results = {};

            if (rom_url) {
              results['xiaomi'] = { title: `${codename.toUpperCase()} Manual`, version: 'Manual', link: rom_url };
              fs.writeFileSync('scrape_results.json', JSON.stringify(results));
              return;
            }

            // Mengambil data terbaru dari master branch
            const url = 'https://raw.githubusercontent.com/XiaomiFirmwareUpdater/miui-updates-tracker/master/data/latest.yml';
            const response = await fetch(url);
            const text = await response.text();
            const data = yaml.load(text);

            let found = null;
            for (const item of data) {
              // Logika pencarian yang lebih kuat: cek codename DAN pastikan metode adalah recovery
              if (item.codename && item.codename.toLowerCase() === codename && 
                  item.method && item.method.toLowerCase() === 'recovery') {
                
                const itemName = item.name.toLowerCase();
                // Cek apakah nama mengandung region yang diminta
                if (itemName.includes(region)) {
                  found = {
                    title: item.name,
                    version: item.version,
                    link: item.link
                  };
                  break;
                }
              }
            }

            if (found) {
              results['xiaomi'] = found;
              fs.writeFileSync('scrape_results.json', JSON.stringify(results));
              console.log("Found:", found);
            } else {
              core.setFailed(`❌ ROM tidak ditemukan untuk ${codename} region ${region}. Pastikan nama region benar (contoh: Global, Indonesia, EEA).`);
            }

      - name: ⚙️ Process ROM
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f scrape_results.json ]; then exit 1; fi

          ROM_URL=$(jq -r '.xiaomi.link' scrape_results.json)
          MARKET_NAME=$(jq -r '.xiaomi.title' scrape_results.json)
          VERSION=$(jq -r '.xiaomi.version' scrape_results.json)

          echo "🚀 Processing: $MARKET_NAME"

          # Download
          aria2c -x 16 -s 16 -j 16 -k 1M -o rom.zip "$ROM_URL"
          unzip rom.zip payload.bin || { echo "Bukan HyperOS/MIUI format payload.bin"; exit 1; }
          
          # Extract partitions
          payload_dumper --partitions system,product,vendor,system_ext,boot,init_boot payload.bin
          
          mkdir -p extracted
          for img in output/*.img; do
            name=$(basename "$img" .img)
            if [[ "$name" != "boot" && "$name" != "init_boot" ]]; then
               mkdir -p "extracted/$name"
               # Menggunakan erofs-utils yang sudah terinstall via apt
               fsck.erofs --extract="extracted/$name" "$img" || 7z x "$img" -y -o"extracted/$name" || true
            fi
          done

          # Generate PIF
          find extracted/ -type f -name "*prop*" -exec strings {} + > all_props.txt
          
          get_val() {
            grep -aE "(^|\.)$1=" all_props.txt | grep -viE "mainline|qssi|generic|qualcomm|missi|sdk" | head -n 1 | cut -d'=' -f2 | tr -d '\r' | xargs
          }

          FP=$(grep -a "fingerprint=" all_props.txt | grep -i "${{ github.event.inputs.codename }}" | head -n 1 | cut -d'=' -f2 | tr -d '\r' | xargs)
          ID=$(get_val "build.id")
          BRAND=$(get_val "product.brand")
          MODEL=$(get_val "product.model")
          PATCH=$(get_val "version.security_patch")
          REL=$(get_val "version.release")
          
          # Logic SDK mapping
          SDK_INT="35"
          case "$REL" in
            "15") SDK_INT="35" ;;
            "14") SDK_INT="34" ;;
            "13") SDK_INT="33" ;;
            "12") SDK_INT="31" ;;
          esac

          # Save JSON
          DIR="database/xiaomi/${{ github.event.inputs.codename }}"
          mkdir -p "$DIR"
          REGION_CLEAN=$(echo "${{ github.event.inputs.region }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')
          FILE_NAME="${{ github.event.inputs.codename }}_${REGION_CLEAN}.json"

          jq -n --arg id "$ID" --arg fp "$FP" --arg model "$MODEL" --arg patch "$PATCH" --arg rel "$REL" --arg sdk "$SDK_INT" \
            '{ID: $id, BRAND: "Xiaomi", DEVICE: "${{ github.event.inputs.codename }}", FINGERPRINT: $fp, MANUFACTURER: "Xiaomi", MODEL: $model, PRODUCT: $model, SECURITY_PATCH: $patch, RELEASE: $rel, SDK_INT: $sdk}' \
            > "$DIR/$FILE_NAME"

          # Update database.json
          TIMESTAMP=$(date +'%d-%m-%Y %H:%M:%S')
          jq --arg cn "${{ github.event.inputs.codename }}" --arg rg "$REGION_CLEAN" --arg m "$MODEL" --arg id "$ID" --arg p "$PATCH" --arg r "$REL" --arg s "$SDK_INT" --arg t "$TIMESTAMP" \
             '.devices.xiaomi[$cn][$rg] = {status: "up_to_date", MODEL: $m, BUILD_ID: $id, RELEASE: $r, SDK_INT: $s, SECURITY_PATCH: $p, last_generated: $t}' \
             database.json > temp.json && mv temp.json database.json

          # Upload Release
          TAG="${{ github.event.inputs.codename }}-${REGION_CLEAN}"
          gh release create "$TAG" output/boot.img output/init_boot.img --title "$MARKET_NAME" --notes "Auto-generated PIF and Assets" --generate-notes || gh release edit "$TAG" --notes "Updated $TIMESTAMP"

      - name: 💾 Commit Changes
        run: |
          git config --global user.name "PIF-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Update Xiaomi ${{ github.event.inputs.codename }} ${{ github.event.inputs.region }}" || true
          git push origin main

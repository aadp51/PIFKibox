name: PIF Factory & Root Assets (Elite)

on:
  workflow_dispatch:
    inputs:
      codename:
        description: 'Codename (blazer, sapphiren, etc)'
        required: true
        default: 'blazer'
      channel:
        description: 'Channel (stable/beta)'
        type: choice
        options:
          - stable
          - beta
        default: 'stable'
      rom_url:
        description: 'Direct Link .zip (Optional)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  forge_pif:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧹 Deep Cleanup (Anti-Sampah)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          # Fetch ALL workflow runs across all workflows (including pages-build-deployment)
          RUNS=$(gh api repos/${{ github.repository }}/actions/runs --paginate -q '.workflow_runs[].id' || echo "")
          for run_id in $RUNS; do
            if [ "$run_id" != "${{ github.run_id }}" ] && [ -n "$run_id" ]; then
              gh api -X DELETE repos/${{ github.repository }}/actions/runs/$run_id --silent || true
            fi
          done

      - name: 🛠️ Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 jq erofs-utils python3-pip p7zip-full
          pip install payload-dumper --break-system-packages || pip install payload-dumper
          npm install cheerio

      - name: 🎣 Scrape / Resolve Link
        id: scraper
        uses: actions/github-script@v7
        with:
          script: |
            const cheerio = require('cheerio');
            const rom_url = '${{ github.event.inputs.rom_url }}';
            const codename = '${{ github.event.inputs.codename }}'.toLowerCase();
            const channel = '${{ github.event.inputs.channel }}';
            
            if (rom_url) {
              core.exportVariable('ROM_URL', rom_url);
              core.exportVariable('MARKET_NAME', codename.toUpperCase());
              return;
            }

            const urls = channel === 'stable' 
              ? ['https://developers.google.com/android/ota?hl=en'] 
              : ['https://developer.android.com/about/versions/17/download-ota?hl=en', 'https://developer.android.com/about/versions/16/download-ota?hl=en'];

            async function startScraping() {
              for (const url of urls) {
                const response = await fetch(url, { headers: { 'Cookie': 'devsite_wall_acks=nexus-ota-tos' } });
                const html = await response.text();
                const $ = cheerio.load(html);
                let found = null;
                
                // Smart search in headers and tables
                $('h2, h3, tr').each((i, el) => {
                  if (found) return;
                  const tagName = $(el).prop('tagName').toLowerCase();
                  
                  if (tagName === 'h2' || tagName === 'h3') {
                    const title = $(el).text().trim();
                    if (title.toLowerCase().includes(codename)) {
                      const table = $(el).nextAll('table').first();
                      const tr = table.find('tr').last();
                      const version = tr.find('td').eq(0).text().trim();
                      
                      let link = tr.find('td').eq(1).find('a').attr('href');
                      if (!link) {
                        const modalId = tr.find('td').eq(1).find('button').attr('data-modal-dialog-id');
                        if (modalId) link = $('#agree-button__' + modalId).attr('href');
                      }
                      
                      if (link) found = { title, version, link };
                    }
                  } else if (tagName === 'tr') {
                    const text = $(el).text().trim().replace(/\s+/g, ' ');
                    if (text.toLowerCase().includes(codename)) {
                      const title = $(el).find('td').eq(0).text().trim();
                      let link = $(el).find('td').eq(1).find('a').attr('href');
                      
                      if (!link) {
                        const modalId = $(el).find('td').eq(1).find('button').attr('data-modal-dialog-id');
                        if (modalId) link = $('#agree-button__' + modalId).attr('href');
                      }
                      
                      if (link) found = { title, version: title, link };
                    }
                  }
                });
                if (found) return found;
              }
            }

            const result = await startScraping();
            if (result) {
              core.exportVariable('ROM_URL', result.link);
              let marketName = result.title.split('(')[0].trim();
              if (marketName.includes(' for ')) marketName = marketName.split(' for ')[1].trim();
              core.exportVariable('MARKET_NAME', marketName);
            } else {
              core.setFailed(`❌ Link not found for ${codename}`);
            }

      - name: 📥 Download & Extract
        run: |
          aria2c -x 16 -s 16 -j 16 -k 1M -o rom.zip "${{ env.ROM_URL }}"
          unzip rom.zip payload.bin && rm rom.zip
          payload_dumper --partitions system,product,vendor,system_ext,boot,init_boot payload.bin && rm payload.bin
          
          mkdir -p extracted
          for img in output/*.img; do
            name=$(basename "$img" .img)
            if [[ "$name" != "boot" && "$name" != "init_boot" ]]; then
               mkdir -p "extracted/$name"
               fsck.erofs --extract="extracted/$name" "$img" || 7z x "$img" -y -o"extracted/$name" || true
               rm "$img"
            fi
          done

      - name: 🧪 Generate PIF & Update Database
        run: |
          find extracted/ -type f -name "*prop*" -exec strings {} + > all_props.txt
          
          get_val() {
            grep -aE "(^|\.)$1=" all_props.txt | grep -viE "mainline|qssi|generic|qualcomm|missi|sdk" | head -n 1 | cut -d'=' -f2 | tr -d '\r' | xargs
          }

          FP=$(grep -a "fingerprint=" all_props.txt | grep -i "${{ github.event.inputs.codename }}" | head -n 1 | cut -d'=' -f2 | tr -d '\r' | xargs)
          ID=$(get_val "build.id")
          BRAND=$(get_val "product.brand")
          MANUFACTURER=$(get_val "product.manufacturer")
          MODEL=$(get_val "product.model")
          PRODUCT=$(get_val "product.name")
          PATCH=$(get_val "version.security_patch")
          REL=$(get_val "version.release")
          INITIAL_SDK=$(get_val "product.first_api_level")
          
          SDK_INT="35"
          [[ "$REL" == "14" ]] && SDK_INT="34"
          [[ "$REL" == "13" ]] && SDK_INT="33"
          [[ "$REL" == "16" ]] && SDK_INT="36"

          # Save PIF
          DIR="database/google/${{ github.event.inputs.codename }}"
          mkdir -p "$DIR"
          FILE_NAME="${{ github.event.inputs.codename }}_${{ github.event.inputs.channel }}.json"
          
          cat <<EOF > "$DIR/$FILE_NAME"
          {
            "ID": "$ID",
            "BRAND": "$BRAND",
            "DEVICE": "${{ github.event.inputs.codename }}",
            "FINGERPRINT": "$FP",
            "MANUFACTURER": "$MANUFACTURER",
            "MODEL": "$MODEL",
            "PRODUCT": "$PRODUCT",
            "SECURITY_PATCH": "$PATCH",
            "DEVICE_INITIAL_SDK_INT": "$INITIAL_SDK",
            "RELEASE": "$REL",
            "SDK_INT": "$SDK_INT"
          }
          EOF

          # Update database.json using jq
          DB="database.json"
          if [ ! -f "$DB" ]; then echo '{"devices":{"google":{}}}' > "$DB"; fi
          
          TIMESTAMP=$(date +'%d-%m-%Y %H:%M:%S')
          PIF_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/$DIR/$FILE_NAME"
          BOOT_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.codename }}/boot.img"
          INIT_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.codename }}/init_boot.img"

          jq --arg codename "${{ github.event.inputs.codename }}" \
             --arg channel "${{ github.event.inputs.channel }}" \
             --arg model "$MODEL" \
             --arg id "$ID" \
             --arg patch "$PATCH" \
             --arg rel "$REL" \
             --arg sdk "$SDK_INT" \
             --arg time "$TIMESTAMP" \
             --arg pif "$PIF_URL" \
             --arg boot "$BOOT_URL" \
             --arg init "$INIT_URL" \
             '.devices.google[$codename][$channel] = {
                "status": "up_to_date",
                "MODEL": $model,
                "BUILD_ID": $id,
                "RELEASE": $rel,
                "SDK_INT": $sdk,
                "SECURITY_PATCH": $patch,
                "last_generated": $time,
                "pif_url": $pif,
                "boot_img": $boot,
                "init_boot_img": $init
             }' "$DB" > temp.json && mv temp.json "$DB"

          echo "PATCH=$PATCH" >> $GITHUB_ENV
          echo "BID=$ID" >> $GITHUB_ENV

      - name: 🚀 Upload Release (Overwrite Mode)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.codename }}"
          printf -v NOTES "ID : %s\n%s %s" "${{ env.BID }}" "${{ env.MARKET_NAME }}" "${{ github.event.inputs.channel }}"
          
          # Check if release exists, if not create it. If it exists, update the notes.
          if gh release view "$TAG"; then
            gh release edit "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" --title "${{ env.MARKET_NAME }} | ${{ github.event.inputs.codename }}" --notes "$NOTES"
          fi
          
          # Upload with --clobber to overwrite. Remove channel from filename to make it pure.
          [ -f "output/boot.img" ] && gh release upload "$TAG" "output/boot.img#boot.img" --clobber
          [ -f "output/init_boot.img" ] && gh release upload "$TAG" "output/init_boot.img#init_boot.img" --clobber

      - name: 💾 Commit & Push Changes
        run: |
          git config --global user.name "PIF-Bot"
          git config --global user.email "bot@github.com"
          git add database/ database.json
          git commit -m "Update ${{ github.event.inputs.codename }} ${{ github.event.inputs.channel }} (${{ env.BID }})" || exit 0
          git push origin main

name: PIF Factory & Root Assets (Elite - Auto Dual Channel)

on:
  workflow_dispatch:
    inputs:
      codename:
        description: 'Codename (blazer, sapphiren, dll)'
        required: true
        default: 'blazer'
      rom_url:
        description: 'Direct Link .zip (Optional - Otomatis dianggap Stable)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  forge_pif:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧹 Deep Cleanup (Anti-Sampah)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          RUNS=$(gh api repos/${{ github.repository }}/actions/runs --paginate -q '.workflow_runs[].id' || echo "")
          for run_id in $RUNS; do
            if [ "$run_id" != "${{ github.run_id }}" ] && [ -n "$run_id" ]; then
              gh api -X DELETE repos/${{ github.repository }}/actions/runs/$run_id --silent || true
            fi
          done

      - name: 🛠️ Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 jq erofs-utils python3-pip p7zip-full
          pip install payload-dumper --break-system-packages || pip install payload-dumper
          npm install cheerio

      - name: 🎣 Scrape / Resolve Link (Stable & Beta)
        id: scraper
        uses: actions/github-script@v7
        with:
          script: |
            const cheerio = require('cheerio');
            const fs = require('fs');
            const codename = '${{ github.event.inputs.codename }}'.toLowerCase();
            const rom_url = '${{ github.event.inputs.rom_url }}';
            
            let results = {};

            // Kalau input manual URL diisi, anggap aja sebagai Stable dan skip scraping
            if (rom_url) {
              results['stable'] = { title: codename.toUpperCase(), version: 'Manual', link: rom_url };
              fs.writeFileSync('scrape_results.json', JSON.stringify(results));
              return;
            }

            const stableUrls = ['https://developers.google.com/android/ota?hl=en'];
            const betaUrls = [
              'https://developer.android.com/about/versions/17/download-ota?hl=en', 
              'https://developer.android.com/about/versions/16/download-ota?hl=en'
            ];

            async function scrape(urls) {
              for (const url of urls) {
                const response = await fetch(url, { headers: { 'Cookie': 'devsite_wall_acks=nexus-ota-tos' } });
                const html = await response.text();
                const $ = cheerio.load(html);
                let found = null;

                $('h2, h3, tr').each((i, el) => {
                  if (found) return;
                  const tagName = $(el).prop('tagName').toLowerCase();
                  
                  if (tagName === 'h2' || tagName === 'h3') {
                    const title = $(el).text().trim();
                    if (title.toLowerCase().includes(codename)) {
                      const table = $(el).nextAll('table').first();
                      const tr = table.find('tr').last();
                      const version = tr.find('td').eq(0).text().trim();
                      
                      let link = tr.find('td').eq(1).find('a').attr('href');
                      if (!link) {
                        const modalId = tr.find('td').eq(1).find('button').attr('data-modal-dialog-id');
                        if (modalId) link = $('#agree-button__' + modalId).attr('href');
                      }
                      if (link) found = { title, version, link };
                    }
                  } else if (tagName === 'tr') {
                    const text = $(el).text().trim().replace(/\s+/g, ' ');
                    if (text.toLowerCase().includes(codename)) {
                      const title = $(el).find('td').eq(0).text().trim();
                      let link = $(el).find('td').eq(1).find('a').attr('href');
                      
                      if (!link) {
                        const modalId = $(el).find('td').eq(1).find('button').attr('data-modal-dialog-id');
                        if (modalId) link = $('#agree-button__' + modalId).attr('href');
                      }
                      if (link) found = { title, version: title, link };
                    }
                  }
                });
                if (found) return found;
              }
              return null;
            }

            // Jalankan scraping untuk keduanya
            results['stable'] = await scrape(stableUrls);
            results['beta'] = await scrape(betaUrls);

            // Bersihkan object kalau ada yang gak ketemu (biar rapi)
            if (!results['stable']) delete results['stable'];
            if (!results['beta']) delete results['beta'];

            fs.writeFileSync('scrape_results.json', JSON.stringify(results));
            console.log("Scrape Results:", JSON.stringify(results, null, 2));

            if (Object.keys(results).length === 0) {
              core.setFailed(`❌ Link ROM tidak ditemukan untuk ${codename} di Stable maupun Beta`);
            }

      - name: ⚙️ Process ROMs (Download, Extract, PIF, Release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for CHANNEL in stable beta; do
            # Cek apakah channel ini ada di file JSON hasil scraping
            if ! jq -e "has(\"$CHANNEL\")" scrape_results.json > /dev/null; then
              echo "⏭️ $CHANNEL tidak ditemukan, skip..."
              continue
            fi

            echo "=========================================================="
            echo "🚀 MEMPROSES CHANNEL: $CHANNEL"
            echo "=========================================================="

            ROM_URL=$(jq -r ".$CHANNEL.link" scrape_results.json)
            RAW_MARKET_NAME=$(jq -r ".$CHANNEL.title" scrape_results.json | cut -d'(' -f1 | xargs)
            if [[ "$RAW_MARKET_NAME" == *" for "* ]]; then
              MARKET_NAME=$(echo "$RAW_MARKET_NAME" | awk -F' for ' '{print $2}' | xargs)
            else
              MARKET_NAME="$RAW_MARKET_NAME"
            fi

            # 1. Download & Extract
            aria2c -x 16 -s 16 -j 16 -k 1M -o rom.zip "$ROM_URL"
            unzip rom.zip payload.bin && rm rom.zip
            payload_dumper --partitions system,product,vendor,system_ext,boot,init_boot payload.bin && rm payload.bin
            
            mkdir -p extracted
            for img in output/*.img; do
              name=$(basename "$img" .img)
              if [[ "$name" != "boot" && "$name" != "init_boot" ]]; then
                 mkdir -p "extracted/$name"
                 fsck.erofs --extract="extracted/$name" "$img" || 7z x "$img" -y -o"extracted/$name" || true
                 rm "$img"
              fi
            done

            # 2. Generate PIF & Update Database
            find extracted/ -type f -name "*prop*" -exec strings {} + > all_props.txt
            
            get_val() {
              grep -aE "(^|\.)$1=" all_props.txt | grep -viE "mainline|qssi|generic|qualcomm|missi|sdk" | head -n 1 | cut -d'=' -f2 | tr -d '\r' | xargs
            }

            FP=$(grep -a "fingerprint=" all_props.txt | grep -i "${{ github.event.inputs.codename }}" | head -n 1 | cut -d'=' -f2 | tr -d '\r' | xargs)
            ID=$(get_val "build.id")
            BRAND=$(get_val "product.brand")
            MANUFACTURER=$(get_val "product.manufacturer")
            MODEL=$(get_val "product.model")
            PRODUCT=$(get_val "product.name")
            PATCH=$(get_val "version.security_patch")
            REL=$(get_val "version.release")
            INITIAL_SDK=$(get_val "product.first_api_level")
            
            SDK_INT="35"
            [[ "$REL" == "14" ]] && SDK_INT="34"
            [[ "$REL" == "13" ]] && SDK_INT="33"
            [[ "$REL" == "16" ]] && SDK_INT="36"

            DIR="database/google/${{ github.event.inputs.codename }}"
            mkdir -p "$DIR"
            FILE_NAME="${{ github.event.inputs.codename }}_${CHANNEL}.json"
            
            cat <<EOF > "$DIR/$FILE_NAME"
            {
              "ID": "$ID",
              "BRAND": "$BRAND",
              "DEVICE": "${{ github.event.inputs.codename }}",
              "FINGERPRINT": "$FP",
              "MANUFACTURER": "$MANUFACTURER",
              "MODEL": "$MODEL",
              "PRODUCT": "$PRODUCT",
              "SECURITY_PATCH": "$PATCH",
              "DEVICE_INITIAL_SDK_INT": "$INITIAL_SDK",
              "RELEASE": "$REL",
              "SDK_INT": "$SDK_INT"
            }
EOF

            DB="database.json"
            if [ ! -f "$DB" ]; then echo '{"devices":{"google":{}}}' > "$DB"; fi
            
            TIMESTAMP=$(date +'%d-%m-%Y %H:%M:%S')
            PIF_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/$DIR/$FILE_NAME"
            BOOT_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.codename }}-${CHANNEL}/boot.img"
            INIT_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.codename }}-${CHANNEL}/init_boot.img"
            
            jq --arg codename "${{ github.event.inputs.codename }}" \
               --arg channel "$CHANNEL" \
               --arg model "$MODEL" \
               --arg id "$ID" \
               --arg patch "$PATCH" \
               --arg rel "$REL" \
               --arg sdk "$SDK_INT" \
               --arg time "$TIMESTAMP" \
               --arg pif "$PIF_URL" \
               --arg boot "$BOOT_URL" \
               --arg init "$INIT_URL" \
               '.devices.google[$codename][$channel] = {
                  "status": "up_to_date",
                  "MODEL": $model,
                  "BUILD_ID": $id,
                  "RELEASE": $rel,
                  "SDK_INT": $sdk,
                  "SECURITY_PATCH": $patch,
                  "last_generated": $time,
                  "pif_url": $pif,
                  "boot_img": $boot,
                  "init_boot_img": $init
               }' "$DB" > temp.json && mv temp.json "$DB"

            # 3. Upload Release
            TAG="${{ github.event.inputs.codename }}-${CHANNEL}"
            printf -v NOTES "ID : %s\n%s %s" "$ID" "$MARKET_NAME" "$CHANNEL"
            
            if gh release view "$TAG"; then
              gh release edit "$TAG" --notes "$NOTES"
            else
              gh release create "$TAG" --title "$MARKET_NAME | ${{ github.event.inputs.codename }} ($CHANNEL)" --notes "$NOTES"
            fi
            
            [ -f "output/boot.img" ] && gh release upload "$TAG" "output/boot.img#boot.img" --clobber
            [ -f "output/init_boot.img" ] && gh release upload "$TAG" "output/init_boot.img#init_boot.img" --clobber

            # 4. Cleanup sisa file untuk persiapan loop channel berikutnya (kalau ada)
            echo "🧹 Membersihkan sisa file $CHANNEL..."
            rm -rf extracted output rom.zip payload.bin all_props.txt
          done

      - name: 💾 Commit & Push Changes
        run: |
          git config --global user.name "PIF-Bot"
          git config --global user.email "bot@github.com"
          git add database/ database.json
          git commit -m "Update ${{ github.event.inputs.codename }} (Auto-Synced)" || exit 0
          git push origin main
          
